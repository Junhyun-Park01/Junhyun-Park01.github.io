<!-- ============================ lightbox ============================ -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Enlarged photo">
  <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
  <button type="button" class="lightbox-nav lightbox-prev" aria-label="Previous photo">&lsaquo;</button>
  <img src="" alt="">
  <button type="button" class="lightbox-nav lightbox-next" aria-label="Next photo">&rsaquo;</button>
  <div class="lightbox-cap"></div>
  <div class="lightbox-dots"></div>
</div>

<script>
  (function () {
    const lb = document.getElementById('lightbox');
    if (!lb) return;
    const lbImg = lb.querySelector('img');
    const lbCap = lb.querySelector('.lightbox-cap');
    const lbDots = lb.querySelector('.lightbox-dots');
    const closeBtn = lb.querySelector('.lightbox-close');
    const prevBtn = lb.querySelector('.lightbox-prev');
    const nextBtn = lb.querySelector('.lightbox-next');
    let group = [];
    let pos = 0;
    let caption = '';

    function render() {
      const it = group[pos];
      if (!it) return;
      lbImg.src = it.src;
      lbImg.alt = it.alt || '';
      lbCap.textContent = caption || '';
      const multi = group.length > 1;
      prevBtn.hidden = !multi;
      nextBtn.hidden = !multi;
      lbDots.innerHTML = '';
      if (multi) {
        group.forEach(function (_, j) {
          const d = document.createElement('span');
          d.className = 'dot' + (j === pos ? ' active' : '');
          lbDots.appendChild(d);
        });
      }
    }
    function openGroup(items, p, cap) {
      group = items;
      pos = p < 0 ? 0 : p;
      caption = cap || '';
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
      render();
    }
    function close() {
      lb.classList.remove('open');
      lbImg.src = '';
      group = [];
      document.body.style.overflow = '';
    }
    function step(n) {
      if (group.length < 2) return;
      pos = (pos + n + group.length) % group.length;
      render();
    }

    document.querySelectorAll('.photo-card img').forEach(function (img) {
      img.addEventListener('click', function () {
        const fig = img.closest('figure');
        const cap = fig ? fig.querySelector('figcaption') : null;
        const multi = img.closest('.photo-multi');
        let items, p;
        if (multi) {
          const mImgs = Array.prototype.slice.call(multi.querySelectorAll('img'));
          items = mImgs.map(function (im) { return { src: im.src, alt: im.alt }; });
          p = mImgs.indexOf(img);
        } else {
          items = [{ src: img.src, alt: img.alt }];
          p = 0;
        }
        openGroup(items, p, cap ? cap.textContent : '');
      });
    });

    closeBtn.addEventListener('click', close);
    prevBtn.addEventListener('click', function (e) { e.stopPropagation(); step(-1); });
    nextBtn.addEventListener('click', function (e) { e.stopPropagation(); step(1); });
    lb.addEventListener('click', function (e) { if (e.target === lb) close(); });
    document.addEventListener('keydown', function (e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') close();
      else if (e.key === 'ArrowLeft') step(-1);
      else if (e.key === 'ArrowRight') step(1);
    });
  })();
</script>
