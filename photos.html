<!-- ============================ lightbox ============================ -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Enlarged photo">
  <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
  <img src="" alt="">
  <div class="lightbox-cap"></div>
</div>

<script>
  (function () {
    const lb = document.getElementById('lightbox');
    if (!lb) return;
    const lbImg = lb.querySelector('img');
    const lbCap = lb.querySelector('.lightbox-cap');
    const closeBtn = lb.querySelector('.lightbox-close');

    function open(src, alt, caption) {
      lbImg.src = src;
      lbImg.alt = alt || '';
      lbCap.textContent = caption || '';
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      lb.classList.remove('open');
      lbImg.src = '';
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.photo-card img').forEach(function (img) {
      img.addEventListener('click', function () {
        const fig = img.closest('figure');
        const cap = fig ? fig.querySelector('figcaption') : null;
        open(img.currentSrc || img.src, img.alt, cap ? cap.textContent : '');
      });
    });

    closeBtn.addEventListener('click', close);
    lb.addEventListener('click', close);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && lb.classList.contains('open')) close();
    });
  })();
</script>
